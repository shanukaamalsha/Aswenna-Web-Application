<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aswenna - Login</title>
    <meta
      name="description"
      content="3D Glassmorphism Dashboard Template by TemplateMo"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="templatemo-glass-admin-style.css" />
    <script>
      // Session management redirect
      (function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('logout')) {
          localStorage.removeItem("aswenna_loggedIn");
          localStorage.removeItem("aswenna_user");
          return;
        }
        const isLoggedIn = localStorage.getItem("aswenna_loggedIn") === "true";
        if (isLoggedIn) {
          window.location.href = "dashboard.html";
        }
      })();
    </script>
    <!--

-->
  </head>
  <body>
    <!-- Animated Background -->
    <div class="background"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-page">
      <!-- Theme Toggle & Back Button -->
      <div class="top-nav-float">
        <a href="index.html" class="btn-back-home" title="Back to Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          <span>Back to Home</span>
        </a>
        <button
          class="theme-toggle-float"
          id="theme-toggle"
          title="Toggle Light/Dark Mode"
        >
          <svg
            class="icon-sun"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="M4.93 4.93l1.41 1.41" />
            <path d="M17.66 17.66l1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="M6.34 17.66l-1.41 1.41" />
            <path d="M19.07 4.93l-1.41 1.41" />
          </svg>
          <svg
            class="icon-moon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            style="display: none"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>

      <div class="login-container">
        <div class="login-card">
          <div class="login-header">
            <div class="logo" style="text-align: center; background: none; border: none; box-shadow: none;">
              <img src="logo.png" alt="" style="width: 200px; height: auto; display: block; margin: 0 auto;" />
            </div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to continue to Aswenna Admin</p>
          </div>

          <form data-validate>
            <div class="form-group">
              <label class="form-label" for="email">Email Address</label>
              <input
                type="email"
                id="email"
                class="form-input"
                placeholder="Enter your email"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <input
                type="password"
                id="password"
                class="form-input"
                placeholder="Enter your password"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary">
              Sign In
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            </button>
          </form>
        </div>
      </div>


    <!-- Firebase Configuration and Login Handler -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
      import { getDatabase, ref, get, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
      
      // Firebase Configuration
      const firebaseConfig = {
        apiKey: "AIzaSyC-OtUg6_wCOCrmU9dwLCRNHq2CFIuw7-E",
        authDomain: "aswenna-8ed3e.firebaseapp.com",
        databaseURL: "https://aswenna-8ed3e-default-rtdb.firebaseio.com",
        projectId: "aswenna-8ed3e",
        storageBucket: "aswenna-8ed3e.firebasestorage.app",
        messagingSenderId: "686567450327",
        appId: "1:686567450327:web:5ab3eed23cd410c16ef292",
        measurementId: "G-BMM9EH874B"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const database = getDatabase(app);
      
      // Make database available globally
      window.firebaseDatabase = database;

      // Test connection and write to database
      async function testConnection() {
        try {
          const connectionRef = ref(database, 'connectionTest');
          await set(connectionRef, {
            message: 'Connection web established!',
            timestamp: new Date().toISOString(),
            status: 'connected'
          });
          console.log('✅ Firebase Connection Test: SUCCESS - Message written to database');
          return true;
        } catch (error) {
          console.error('❌ Firebase Connection Test Failed:', error);
          return false;
        }
      }

      // Validate login credentials for admin only
      async function validateLogin(email, password) {
        try {
          // Only allow admin login via the fixed admin email
          const adminEmail = "admin@aswenna.com";
          const ADMIN_DB_KEY = "-OqzAdminUser12345678";

          if (email !== adminEmail) {
            throw new Error('Invalid email or password');
          }

          // Fetch admin record from Firebase to get the LATEST password
          const adminRef = ref(database, 'users/' + ADMIN_DB_KEY);
          const snapshot = await get(adminRef);

          if (!snapshot.exists()) {
            throw new Error('Admin user data not found in database');
          }

          const adminData = snapshot.val();

          // Compare password against the value stored in Firebase
          if (adminData.password !== password) {
            throw new Error('Invalid email or password');
          }

          console.log('✅ Admin credentials validated');
          return { success: true, user: adminData, userId: ADMIN_DB_KEY };
        } catch (error) {
          console.error('Validation Error:', error.message);
          throw error;
        }
      }

      // Test connection on page load
      setTimeout(testConnection, 500);

      // Wait for DOM to be ready, then attach form handler
      document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.querySelector('form[data-validate]');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        
        if (!loginForm) {
          console.error('❌ Login form not found');
          return;
        }

        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const email = emailInput.value.trim();
          const password = passwordInput.value.trim();
          const submitBtn = loginForm.querySelector('button[type="submit"]');
          const originalText = submitBtn.innerHTML;

          // Validation checks
          if (!email) {
            alert('❌ Please enter your email address');
            return;
          }

          if (!password) {
            alert('❌ Please enter your password');
            return;
          }

          // Disable button and show loading state
          submitBtn.innerHTML = '⏳ Signing in...';
          submitBtn.disabled = true;

          try {
            console.log(`🔐 Attempting login for email: ${email}`);
            
            // Validate credentials against database
            const result = await validateLogin(email, password);

            if (result.success) {
              // Store user data in localStorage
              const userData = {
                userId: result.userId,
                firstName: result.user.firstName,
                lastName: result.user.lastName,
                email: result.user.email,
                role: result.user.role,
                phone: result.user.phone || '',
                district: result.user.district || '',
                address: result.user.address || '',
                profileImageUri: result.user.profileImageUri || ''
              };

              localStorage.setItem('aswenna_user', JSON.stringify(userData));
              localStorage.setItem('aswenna_loggedIn', 'true');

              console.log('✅ Login successful - User data stored');
              alert('✅ Login Successful! Welcome ' + result.user.firstName);

              // Redirect to dashboard after a brief delay
              setTimeout(() => {
                window.location.href = 'dashboard.html';
              }, 500);
            }
          } catch (error) {
            console.error('❌ Login Error:', error.message);
            
            // Specific error messages
            if (error.message.includes('Database Error')) {
              alert('❌ Database connection error. Please try again.');
            } else if (error.message.includes('Invalid email or password')) {
              alert('❌ Invalid email or password. Please check your credentials.');
            } else {
              alert('❌ Login Failed: ' + error.message);
            }
          } finally {
            // Restore button state
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
          }
        });
      });
    </script>

    <script src="templatemo-glass-admin-script.js"></script>
    <!-- TemplateMo 607 Glass Admin -->
  </body>
</html>
