<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="logo.png" />
    <title>Aswenna - Market Insights</title>
    <meta name="description" content="Aswenna Market Insights Management" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="templatemo-glass-admin-style.css" />
    <script>
      // Apply theme immediately to prevent flicker
      if (localStorage.getItem("theme") === "light") {
        document.documentElement.setAttribute("data-theme", "light");
      }
    </script>
    <style>
      .market-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
        margin-top: 2rem;
      }
      .paddy-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        position: relative;
        display: flex;
        flex-direction: column;
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--glass-border);
      }
      .paddy-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      }
      .paddy-image {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 12px;
        margin-bottom: 1rem;
        background: rgba(255,255,255,0.05);
      }
      .paddy-info h3 {
        display: none; /* Moved to header */
      }
      .price-range {
        display: flex;
        justify-content: space-between;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--glass-border);
      }
      .price-item {
        display: flex;
        flex-direction: column;
      }
      .price-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
      }
      .price-value {
        font-weight: 700;
        color: var(--emerald);
        font-size: 1.1rem;
      }
      .card-actions {
        display: flex;
        gap: 5px;
        opacity: 1;
      }
      .action-btn {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        cursor: pointer;
        color: var(--text-primary);
        backdrop-filter: blur(10px);
        transition: transform 0.2s ease, background 0.2s ease;
      }
      .action-btn:hover {
        background: rgba(255,255,255,0.2);
        transform: scale(1.1);
      }
      .add-fab {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--emerald), var(--emerald-light));
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 20px rgba(5, 150, 105, 0.3);
        cursor: pointer;
        z-index: 100;
        border: none;
        transition: transform 0.3s ease;
      }
      .add-fab:hover {
        transform: scale(1.1);
      }
      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 4rem;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="background"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="dashboard">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <img src="logo.png" alt="" style="width: 90%" />
          </div>
          <span class="logo-text">Aswenna Admin</span>
        </div>

        <ul class="nav-menu">
          <li class="nav-section">
            <span class="nav-section-title">Main Menu</span>
            <ul>
              <li class="nav-item"><a href="dashboard.html" class="nav-link"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" /></svg>Dashboard</a></li>
              <li class="nav-item"><a href="consultation.html" class="nav-link"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" /></svg>Consultation</a></li>
              <li class="nav-item"><a href="news.html" class="nav-link"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" /></svg>News Feed</a></li>
              <li class="nav-item"><a href="analytics.html" class="nav-link active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg>Market Insights</a></li>
              <li class="nav-item"><a href="users.html" class="nav-link"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>Users</a></li>
              <li class="nav-item"><a href="settings.html" class="nav-link"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>Settings</a></li>
            </ul>
          <li class="nav-section">
            <span class="nav-section-title">Account</span>
            <ul>
              <li class="nav-item">
                <a href="login.html" class="nav-link">
                  <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                  </svg>
                  Logout
                </a>
              </li>
            </ul>
          </li>
        </ul>

        <div class="sidebar-footer">
          <div class="user-profile">
            <div class="user-avatar" id="sidebar-avatar">AD</div>
            <div class="user-info">
              <div class="user-name" id="sidebar-name">Admin</div>
              <div class="user-role" id="sidebar-role">Administrator</div>
            </div>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <nav class="navbar">
          <div class="page-header">
            <h1 class="page-title">Market Insights</h1>
            <div class="page-breadcrumb"><a href="dashboard.html">Dashboard</a><span>/</span><span>Market Insights</span></div>
          </div>
          <div class="navbar-right">
            <div class="search-box">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input type="text" id="market-search-input" class="search-input" placeholder="Search paddy varieties..." oninput="renderGrid()" />
            </div>

            <button class="nav-btn" id="theme-toggle" title="Toggle Light/Dark Mode">
              <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/>
              </svg>
              <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </button>
          </div>
        </nav>

        <section class="market-grid" id="paddy-grid">
          <div class="empty-state">Loading market data...</div>
        </section>
      </main>
    </div>

    <button class="add-fab" onclick="openModal()" title="Add New Paddy Type">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
    </button>

    <!-- MODAL -->
    <div class="modal-overlay" id="paddy-modal" style="display: none;">
      <div class="modal-content glass-card" style="max-width: 500px;">
        <div class="modal-header">
          <h3 class="modal-title" id="modal-title">Add Paddy Type</h3>
          <button class="modal-close" onclick="closeModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
          </button>
        </div>
        <form id="paddy-form" onsubmit="handleSubmit(event)">
          <input type="hidden" id="paddy-id" />
          <div class="form-group full-width">
            <label class="form-label">Paddy Name</label>
            <input type="text" id="paddy-name" class="form-input" placeholder="e.g., Basmati" required />
          </div>
          <div class="form-group full-width">
            <label class="form-label">Image URL</label>
            <input type="url" id="paddy-image" class="form-input" placeholder="https://example.com/image.jpg" required />
          </div>
          <div style="display: flex; gap: 1rem; width: 100%;">
            <div class="form-group" style="flex: 1;">
              <label class="form-label">Min Price (LKR)</label>
              <input type="number" id="paddy-min" class="form-input" placeholder="220" required />
            </div>
            <div class="form-group" style="flex: 1;">
              <label class="form-label">Max Price (LKR)</label>
              <input type="number" id="paddy-max" class="form-input" placeholder="1000" required />
            </div>
          </div>
          <div class="form-actions" style="margin-top: 1.5rem; display: flex; justify-content: flex-end; gap: 1rem;">
            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-primary" id="save-btn">Save Changes</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyC-OtUg6_wCOCrmU9dwLCRNHq2CFIuw7-E",
        authDomain: "aswenna-8ed3e.firebaseapp.com",
        databaseURL: "https://aswenna-8ed3e-default-rtdb.firebaseio.com",
        projectId: "aswenna-8ed3e",
        storageBucket: "aswenna-8ed3e.firebasestorage.app",
        messagingSenderId: "686567450327",
        appId: "1:686567450327:web:5ab3eed23cd410c16ef292",
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      // --- USER AUTH & SIDEBAR ---
      function checkAuth() {
        const userData = localStorage.getItem("aswenna_user");
        const isLoggedIn = localStorage.getItem("aswenna_loggedIn");
        if (!userData || isLoggedIn !== "true") { window.location.href = "login.html"; return null; }
        try { return JSON.parse(userData); } catch { window.location.href = "login.html"; return null; }
      }

      function getInitials(firstName, lastName) {
        let inits = "";
        if (firstName) inits += firstName.charAt(0).toUpperCase();
        if (lastName) inits += lastName.charAt(0).toUpperCase();
        return inits || "A";
      }

      function updateUIWithUserData(user) {
        const initials = getInitials(user.firstName, user.lastName);
        const fullName = (user.firstName || "") + " " + (user.lastName || "");
        
        const elSidebarAvatar = document.getElementById("sidebar-avatar");
        const elSidebarName = document.getElementById("sidebar-name");
        const elSidebarRole = document.getElementById("sidebar-role");
        
        if (elSidebarAvatar) {
          if (user.profileImageUri) {
            elSidebarAvatar.innerHTML = `<img src="${user.profileImageUri}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;" />`;
          } else {
            elSidebarAvatar.textContent = initials;
          }
        }
        if (elSidebarName) elSidebarName.textContent = fullName || "Admin";
        if (elSidebarRole) elSidebarRole.textContent = user.role === "admin" ? "Administrator" : "User";
      }

      document.addEventListener("DOMContentLoaded", () => {
        const currentUser = checkAuth();
        if (currentUser) {
          updateUIWithUserData(currentUser);
        }
        
        // --- THEME TOGGLE LOGIC ---
        const themeToggle = document.getElementById("theme-toggle");
        const sunIcon = document.querySelector(".icon-sun");
        const moonIcon = document.querySelector(".icon-moon");
        
        function updateThemeIcons(isLight) {
          if (isLight) {
            sunIcon.style.display = "none";
            moonIcon.style.display = "block";
          } else {
            sunIcon.style.display = "block";
            moonIcon.style.display = "none";
          }
        }

        // Initialize icons based on current theme
        const isCurrentlyLight = document.documentElement.getAttribute("data-theme") === "light";
        updateThemeIcons(isCurrentlyLight);
        
        themeToggle.addEventListener("click", () => {
          const currentTheme = document.documentElement.getAttribute("data-theme");
          const newTheme = currentTheme === "light" ? "dark" : "light";
          
          document.documentElement.setAttribute("data-theme", newTheme);
          localStorage.setItem("theme", newTheme);
          updateThemeIcons(newTheme === "light");
        });
      });
      // ----------------------------

      let paddyData = [];

      function openModal(id = null) {
        const modal = document.getElementById("paddy-modal");
        const form = document.getElementById("paddy-form");
        const title = document.getElementById("modal-title");
        form.reset();
        document.getElementById("paddy-id").value = "";

        if (id) {
          title.innerText = "Edit Paddy Type";
          const item = paddyData.find(p => p.id === id);
          if (item) {
            document.getElementById("paddy-id").value = item.id;
            document.getElementById("paddy-name").value = item.name;
            document.getElementById("paddy-image").value = item.imageUrl;
            document.getElementById("paddy-min").value = item.minValue;
            document.getElementById("paddy-max").value = item.maxValue;
          }
        } else {
          title.innerText = "Add Paddy Type";
        }
        modal.style.display = "flex";
      }

      function closeModal() {
        document.getElementById("paddy-modal").style.display = "none";
      }

      async function handleSubmit(e) {
        e.preventDefault();
        const id = document.getElementById("paddy-id").value;
        const name = document.getElementById("paddy-name").value;
        const imageUrl = document.getElementById("paddy-image").value;
        const minValue = parseInt(document.getElementById("paddy-min").value);
        const maxValue = parseInt(document.getElementById("paddy-max").value);

        const payload = { name, imageUrl, minValue, maxValue, id: id || name.toLowerCase().replace(/\s+/g, '-') };
        
        try {
          await db.ref("paddyTypes/" + payload.id).set(payload);
          closeModal();
        } catch (error) {
          alert("Error saving: " + error.message);
        }
      }

      async function deletePaddy(id) {
        if (confirm("Are you sure you want to delete this paddy type?")) {
          await db.ref("paddyTypes/" + id).remove();
        }
      }

      function renderGrid() {
        const grid = document.getElementById("paddy-grid");
        const searchInput = document.getElementById("market-search-input");
        const searchTerm = searchInput ? searchInput.value.toLowerCase() : "";

        let filteredData = paddyData;
        if (searchTerm) {
          filteredData = paddyData.filter(p => p.name.toLowerCase().includes(searchTerm));
        }

        if (filteredData.length === 0) {
          grid.innerHTML = searchTerm 
            ? '<div class="empty-state">No matching paddy types found.</div>'
            : '<div class="empty-state">No paddy types found. Click + to add one.</div>';
          return;
        }

        grid.innerHTML = filteredData.map(p => `
          <div class="glass-card paddy-card">
            <div class="card-header">
              <h3 style="margin:0; font-size:1.1rem; font-weight:600; color:var(--text-primary);">${p.name}</h3>
              <div class="card-actions">
                <button class="action-btn" onclick="openModal('${p.id}')" title="Edit">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>
                </button>
                <button class="action-btn" onclick="deletePaddy('${p.id}')" title="Delete" style="color: #ff6b6b;">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg>
                </button>
              </div>
            </div>
            <img src="${p.imageUrl}" class="paddy-image" onerror="this.src='https://via.placeholder.com/300x180?text=No+Image'">
            <div class="paddy-info">
              <div class="price-range">
                <div class="price-item">
                  <span class="price-label">Min Price</span>
                  <span class="price-value">Rs. ${p.minValue}</span>
                </div>
                <div class="price-item">
                  <span class="price-label">Max Price</span>
                  <span class="price-value">Rs. ${p.maxValue}</span>
                </div>
              </div>
            </div>
          </div>
        `).join("");
      }

      db.ref("paddyTypes").on("value", snap => {
        paddyData = [];
        snap.forEach(child => { paddyData.push(child.val()); });
        renderGrid();
      });
    </script>
  </body>
</html>
